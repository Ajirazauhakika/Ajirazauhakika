    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; text-align: center; margin: 0; padding: 20px; }
        .container { background: white; max-width: 450px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #003366; font-size: 24px; margin-bottom: 10px; font-weight: bold; }
        .orange { color: #ff9800; }
        .intro-text { color: #555; font-size: 15px; margin-bottom: 25px; }
        .sectors { text-align: left; margin-bottom: 20px; color: #333; font-size: 16px; font-weight: 600; }
        .sectors p { margin: 10px 0; display: flex; align-items: center; }
        .sectors i { color: #ff9800; margin-right: 15px; }
        /* Maelezo mapya ya location */
        .location-info { text-align: left; background: #fff3e0; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #ff9800; }
        
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; background-color: #25d366; color: white; padding: 18px; text-decoration: none; border-radius: 12px; font-weight: bold; margin-bottom: 30px; }
        
        .socials { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; }
        .socials a { font-size: 30px; text-decoration: none; }
        .fb { color: #1877f2; } .ig { color: #e1306c; } 
        /* Google rangi halisi */
        .google { color: #4285f4; } 
        
        .admin-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: left; }
        .admin-profile { display: flex; align-items: center; margin-bottom: 15px; }
        /* Kuhakikisha picha zinaonekana */
        .admin-profile img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid #ff9800; background-color: #eee; }
    </style>
</head>
